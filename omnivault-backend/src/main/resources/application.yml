spring:
  application:
    name: omnivault-backend

  # Profile configuration
  profiles:
    active: dev

  # Database configuration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: OmnivaultHikariCP
      connection-timeout: 20000

  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        # Temporarily disable constraint checks during startup
        check_nullability: false

    open-in-view: false

  # Flyway migration configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # File upload configuration
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 100MB
      max-request-size: 100MB

  # Cache configuration
  cache:
    type: caffeine
    cache-names: contents, folders, tags, users
    caffeine:
      spec: maximumSize=500,expireAfterAccess=600s

# Server configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024

# Custom application properties
app:
  # JWT Configuration
  jwt:
    secret: ${JWT_SECRET:KS7bVTgyjY&(d2BKRQPq$Ln6!^nUMGLrE4V3*5%#cW@NF9AaH8zX$C2vB@mPqW3sDf5gH7jK8lM9nPzX1cV2bN3mQ4wE5rT6yU7iO8pP0aS1dF2gH3jK4lZ5xC6vB7nM8qW9eR0tY}
    accessTokenExpirationMs: 3600000  # 1 hour
    refreshTokenExpirationMs: 2592000000 # 30 days

  oauth2:
    providers:
      google:
        client-id: ${OAUTH_GOOGLE_CLIENT_ID:your-client-id}
        client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:your-client-secret}
        redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/oauth2/callback/google}
        authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
        token-uri: https://oauth2.googleapis.com/token
        user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
        scopes:
          - openid
          - email
          - profile
          - https://www.googleapis.com/auth/drive.file
          - https://www.googleapis.com/auth/drive.appdata

  # Storage configuration
  storage:
    location: ${STORAGE_LOCATION:./omnivault-storage}
    # Maximum file size per content type in MB
    max-size:
      image: 10
      video: 100
      document: 50
      other: 25
    googledrive:
      enabled: ${GOOGLE_DRIVE_ENABLED:false}
      root-folder-name: ${GOOGLE_DRIVE_ROOT_FOLDER:omniVault}
      application-name: ${GOOGLE_DRIVE_APP_NAME:omniVault}

  # CORS configuration
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    max-age: 3600

# Logging configuration
logging:
  level:
    root: INFO
    com.personal.omnivault: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"